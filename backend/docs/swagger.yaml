basePath: /api
definitions:
  main.AddToCartRequest:
    properties:
      product_id:
        type: string
      quantity:
        type: integer
    type: object
  main.ApiResponse:
    properties:
      data: {}
      error: {}
      status:
        type: string
    type: object
  main.AuthResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/main.User'
    type: object
  main.CartItem:
    properties:
      id:
        type: string
      product:
        $ref: '#/definitions/main.Product'
      product_id:
        type: string
      quantity:
        type: integer
      user_id:
        type: string
    type: object
  main.CartResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/main.CartItem'
        type: array
      total:
        type: number
    type: object
  main.Product:
    properties:
      category:
        type: string
      description:
        type: string
      id:
        type: string
      image_url:
        type: string
      price:
        type: number
      title:
        type: string
    type: object
  main.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
    type: object
host: api.keurope.com
info:
  contact: {}
  description: Korean Fashion E-commerce Backend API
  title: Keurope API
  version: "1.0"
paths:
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      parameters:
      - description: User email
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Forgot Password
      tags:
      - Auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user with email and password, returns JWT token
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.AuthResponse'
        "401":
          description: Invalid credentials
          schema:
            type: string
      summary: User Login
      tags:
      - Auth
  /auth/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.User'
        "401":
          description: Unauthorized
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Get Current User
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account with email and password
      parameters:
      - description: Registration data
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/main.AuthResponse'
        "400":
          description: Invalid request or user already exists
          schema:
            type: string
      summary: User Registration
      tags:
      - Auth
  /auth/reset-password:
    post:
      consumes:
      - application/json
      parameters:
      - description: Reset token and new password
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Reset Password
      tags:
      - Auth
  /cart:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.CartResponse'
        "401":
          description: Unauthorized
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Get Shopping Cart
      tags:
      - Cart
    post:
      consumes:
      - application/json
      parameters:
      - description: Product ID and quantity
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/main.AddToCartRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.CartItem'
        "400":
          description: Invalid request
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Add to Cart
      tags:
      - Cart
  /orders:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.ApiResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ApiResponse'
      security:
      - BearerAuth: []
      summary: Get User Orders
      tags:
      - Orders
    post:
      consumes:
      - application/json
      description: Create a new order with shipping information
      parameters:
      - description: Order details
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/main.ApiResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ApiResponse'
      security:
      - BearerAuth: []
      summary: Create Order
      tags:
      - Orders
  /products:
    get:
      description: Get all products with optional category filter
      parameters:
      - description: Category name
        in: query
        name: category
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: List Products
      tags:
      - Products
schemes:
- https
- http
securityDefinitions:
  BearerAuth:
    description: '"Type ''Bearer TOKEN''"'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
